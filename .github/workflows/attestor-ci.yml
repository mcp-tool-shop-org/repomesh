name: attestor-ci

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write  # FT-O-003: escalate a crashed verifier run to a tracking issue

jobs:
  attest-and-check:
    runs-on: ubuntu-latest
    # STGB-CI-004: bound wall-clock so a hung verifier/network step can't burn toward the 6h ceiling.
    timeout-minutes: 15
    steps:
      # B-8: Actions pinned to major version tags (v4) — acceptable for this project.
      # Full SHA pinning not required; major tags provide auto-patching with low risk.
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # The verifiers import ajv/ajv-formats via verifiers/lib/load-overrides.mjs. Without an install
      # they crash on import in CI (no node_modules) — which the andon below correctly halts on. Install
      # the workspace deps so the verifiers actually run. (Pre-existing gap surfaced by the andon.)
      - name: Install dependencies
        run: npm ci || npm install

      # Run attestor (scan for unattested releases)
      - name: Run attestor
        env:
          REPOMESH_SIGNING_KEY: ${{ secrets.REPOMESH_SIGNING_KEY }}
          REPOMESH_KEY_ID: ci-repomesh-2026
        run: |
          mkdir -p /tmp/repomesh-ci /tmp/repomesh-ci/logs
          node attestor/scripts/attest-release.mjs --scan-new --sign --output /tmp/repomesh-ci/attestations.jsonl 2>/tmp/repomesh-ci/logs/attestor.log || { echo "::warning::Attestor crashed (see logs)"; echo "attestor" >> /tmp/repomesh-ci/failures.txt; }

      # Run license verifier
      - name: Run license verifier
        env:
          REPOMESH_SIGNING_KEY: ${{ secrets.REPOMESH_SIGNING_KEY }}
          REPOMESH_KEY_ID: ci-repomesh-2026
        run: |
          node verifiers/license/scripts/verify-license.mjs --scan-new --sign --output /tmp/repomesh-ci/license.jsonl 2>/tmp/repomesh-ci/logs/license.log || { echo "::warning::License verifier crashed (see logs)"; echo "license" >> /tmp/repomesh-ci/failures.txt; }

      # Run security verifier
      - name: Run security verifier
        env:
          REPOMESH_SIGNING_KEY: ${{ secrets.REPOMESH_SIGNING_KEY }}
          REPOMESH_KEY_ID: ci-repomesh-2026
        run: |
          node verifiers/security/scripts/verify-security.mjs --scan-new --sign --output /tmp/repomesh-ci/security.jsonl 2>/tmp/repomesh-ci/logs/security.log || { echo "::warning::Security verifier crashed (see logs)"; echo "security" >> /tmp/repomesh-ci/failures.txt; }

      # Run reproducibility verifier
      - name: Run reproducibility verifier
        env:
          REPOMESH_SIGNING_KEY: ${{ secrets.REPOMESH_SIGNING_KEY }}
          REPOMESH_KEY_ID: ci-repomesh-2026
        run: |
          node verifiers/repro/scripts/verify-repro.mjs --scan-new --sign --output /tmp/repomesh-ci/repro.jsonl 2>/tmp/repomesh-ci/logs/repro.log || { echo "::warning::Reproducibility verifier crashed (see logs)"; echo "repro" >> /tmp/repomesh-ci/failures.txt; }

      # Run policy checks
      - name: Run policy checks
        env:
          REPOMESH_SIGNING_KEY: ${{ secrets.REPOMESH_SIGNING_KEY }}
          REPOMESH_KEY_ID: ci-repomesh-2026
        run: |
          node policy/scripts/check-policy.mjs --sign --output /tmp/repomesh-ci/violations.jsonl 2>/tmp/repomesh-ci/logs/policy.log || { echo "::warning::Policy check crashed (see logs)"; echo "policy" >> /tmp/repomesh-ci/failures.txt; }

      # B-3: Upload verifier logs as artifacts for debugging
      - name: Upload verifier logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repomesh-ci-logs
          path: /tmp/repomesh-ci/logs/
          retention-days: 7
          if-no-files-found: ignore

      # STGB-CI-003 (andon): a CRASHED verifier (distinct from "found nothing new", which exits 0)
      # must HALT the run — a partial/missing attestation set must never silently advance the ledger.
      # This was previously a `|| echo ::warning::` fail-open (the same class Stage A fixed in
      # ledger-ci). Logs were already uploaded above (always()), so debugging is preserved.
      - name: Andon — halt on any verifier crash
        run: |
          if [ -s /tmp/repomesh-ci/failures.txt ]; then
            echo "::error::Verifier(s) crashed: $(tr '\n' ' ' < /tmp/repomesh-ci/failures.txt). Refusing to append a partial attestation set to the ledger — re-run after fixing."
            exit 1
          fi
          echo "All verifiers completed without crashing."

      # Check if there are new events to append
      - name: Check for new events
        id: check
        run: |
          ATTESTATIONS=$(wc -l < /tmp/repomesh-ci/attestations.jsonl 2>/dev/null || echo 0)
          LICENSE=$(wc -l < /tmp/repomesh-ci/license.jsonl 2>/dev/null || echo 0)
          SECURITY=$(wc -l < /tmp/repomesh-ci/security.jsonl 2>/dev/null || echo 0)
          REPRO=$(wc -l < /tmp/repomesh-ci/repro.jsonl 2>/dev/null || echo 0)
          VIOLATIONS=$(wc -l < /tmp/repomesh-ci/violations.jsonl 2>/dev/null || echo 0)
          TOTAL=$((ATTESTATIONS + LICENSE + SECURITY + REPRO + VIOLATIONS))
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "attestations=$ATTESTATIONS" >> "$GITHUB_OUTPUT"
          echo "license=$LICENSE" >> "$GITHUB_OUTPUT"
          echo "security=$SECURITY" >> "$GITHUB_OUTPUT"
          echo "repro=$REPRO" >> "$GITHUB_OUTPUT"
          echo "violations=$VIOLATIONS" >> "$GITHUB_OUTPUT"
          echo "Attestations: $ATTESTATIONS, License: $LICENSE, Security: $SECURITY, Repro: $REPRO, Violations: $VIOLATIONS, Total: $TOTAL"

      # Rate limit: skip if an attestor PR is already open
      - name: Check for existing attestor PR
        if: steps.check.outputs.total != '0'
        id: rate
        env:
          GH_TOKEN: ${{ secrets.REPOMESH_LEDGER_TOKEN }}
        run: |
          OPEN=$(gh pr list --search "attestor/" --state open --json number --jq 'length' 2>/dev/null || echo 0)
          echo "open=$OPEN" >> "$GITHUB_OUTPUT"
          if [ "$OPEN" -gt "0" ]; then
            echo "Attestor PR already open — skipping to avoid PR pile-up."
          fi

      # Append events and open PR
      - name: Append events to ledger via PR
        if: steps.check.outputs.total != '0' && steps.rate.outputs.open == '0'
        env:
          GH_TOKEN: ${{ secrets.REPOMESH_LEDGER_TOKEN }}
        run: |
          BRANCH="attestor/$(date -u +%Y%m%d-%H%M%S)"

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "repomesh-bot"
          git config user.email "repomesh-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Append attestation events
          if [ -s /tmp/repomesh-ci/attestations.jsonl ]; then
            cat /tmp/repomesh-ci/attestations.jsonl >> ledger/events/events.jsonl
          fi

          # Append license verifier events
          if [ -s /tmp/repomesh-ci/license.jsonl ]; then
            cat /tmp/repomesh-ci/license.jsonl >> ledger/events/events.jsonl
          fi

          # Append security verifier events
          if [ -s /tmp/repomesh-ci/security.jsonl ]; then
            cat /tmp/repomesh-ci/security.jsonl >> ledger/events/events.jsonl
          fi

          # Append reproducibility verifier events
          if [ -s /tmp/repomesh-ci/repro.jsonl ]; then
            cat /tmp/repomesh-ci/repro.jsonl >> ledger/events/events.jsonl
          fi

          # Append violation events
          if [ -s /tmp/repomesh-ci/violations.jsonl ]; then
            cat /tmp/repomesh-ci/violations.jsonl >> ledger/events/events.jsonl
          fi

          git add ledger/events/events.jsonl
          git commit -m "attestor: ${{ steps.check.outputs.attestations }} attestation(s), ${{ steps.check.outputs.license }} license, ${{ steps.check.outputs.security }} security, ${{ steps.check.outputs.repro }} repro, ${{ steps.check.outputs.violations }} violation(s)"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --head "$BRANCH" \
            --title "attestor: ${{ steps.check.outputs.attestations }} attestation(s), ${{ steps.check.outputs.license }} license, ${{ steps.check.outputs.security }} security, ${{ steps.check.outputs.repro }} repro" \
            --body "$(cat <<'EOF'
          ## RepoMesh Attestor Run

          **Attestations:** ${{ steps.check.outputs.attestations }}
          **License Audits:** ${{ steps.check.outputs.license }}
          **Security Scans:** ${{ steps.check.outputs.security }}
          **Repro Builds:** ${{ steps.check.outputs.repro }}
          **Policy Violations:** ${{ steps.check.outputs.violations }}

          Automated attestor + verifier + policy scan. Ledger CI verifies schema + signatures; this PR auto-merges on green.
          EOF
          )")
          echo "Opened $PR_URL"
          # Close the loop (same as anchor-xrpl): auto-merge on green so attestor PRs don't pile up
          # unmerged + freeze the ledger. Degrades gracefully if allow_auto_merge isn't enabled.
          gh pr merge --auto --merge "$PR_URL" \
            || echo "::warning::Could not enable auto-merge on $PR_URL. Enable once: gh api -X PATCH repos/${{ github.repository }} -f allow_auto_merge=true."

      # FT-O-003: escalate beyond ::error:: — open/update ONE tracking issue when a verifier crashes
      # (the andon halt above), so a degraded attestor pipeline is visible outside the Actions log.
      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="⚠ automation: attestor-ci is failing"
          RUN="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="The attestor/verifier/policy cron failed (a verifier crashed, or the run errored). Attestations may be missing from the ledger. Run: $RUN"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Still failing — $RUN"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label automation-alert 2>/dev/null \
              || gh issue create --title "$TITLE" --body "$BODY"
          fi
