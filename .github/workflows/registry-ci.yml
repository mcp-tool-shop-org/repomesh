name: registry-ci

on:
  push:
    branches: [main]
    paths:
      - 'ledger/nodes/**'
      - 'ledger/events/**'
      - 'registry/scripts/**'
      - 'profiles/**'
      - '.github/workflows/registry-ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-registry:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # STGB-CI-004: bound wall-clock (build + network)
    steps:
      # B-8: Actions pinned to major version tags (v4) — acceptable for this project.
      # Full SHA pinning not required; major tags provide auto-patching with low risk.
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate profile snapshots
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const nodesDir = 'ledger/nodes';
          const validProfiles = ['baseline', 'open-source', 'regulated'];
          let errors = 0;
          if (!fs.existsSync(nodesDir)) process.exit(0);
          for (const org of fs.readdirSync(nodesDir, { withFileTypes: true }).filter(d => d.isDirectory())) {
            for (const repo of fs.readdirSync(path.join(nodesDir, org.name), { withFileTypes: true }).filter(d => d.isDirectory())) {
              const profilePath = path.join(nodesDir, org.name, repo.name, 'repomesh.profile.json');
              if (!fs.existsSync(profilePath)) continue;
              try {
                const p = JSON.parse(fs.readFileSync(profilePath, 'utf8'));
                if (!validProfiles.includes(p.profileId)) {
                  console.error('Invalid profile ' + p.profileId + ' in ' + profilePath);
                  errors++;
                }
                console.log('  OK ' + org.name + '/' + repo.name + ': ' + p.profileId);
              } catch (e) {
                console.error('Parse error in ' + profilePath + ': ' + e.message);
                errors++;
              }
            }
          }
          if (errors > 0) { console.error(errors + ' profile validation error(s)'); process.exit(1); }
          console.log('All profile snapshots valid.');
          "

      # B-5: All registry build scripts run in a single step with set -e
      # to prevent committing partial registry state on failure
      - name: Build registry (all indexes)
        run: |
          set -e
          node registry/scripts/build-registry.mjs
          node registry/scripts/build-trust.mjs
          node registry/scripts/build-dependencies.mjs
          node registry/scripts/build-verifiers.mjs
          node registry/scripts/build-anchors.mjs
          node registry/scripts/build-badges.mjs
          node registry/scripts/build-snippets.mjs

      # `main` is a PROTECTED branch — a direct `git push` of the regenerated registry fails with
      # GH006 (protected branch update failed). When the derived registry drifts from the ledger,
      # open an AUTO-MERGING PR instead (mirrors the anchor/attestor cron pattern, which already
      # work against protection via the REPOMESH_LEDGER_TOKEN PAT). Idempotent: no drift => no PR.
      - name: Commit + PR registry changes (protected main)
        env:
          GH_TOKEN: ${{ secrets.REPOMESH_LEDGER_TOKEN }}
        run: |
          git add registry/nodes.json registry/capabilities.json registry/trust.json registry/dependencies.json registry/verifiers.json registry/anchors.json registry/badges/ registry/snippets/
          if git diff --cached --quiet; then
            echo "No registry changes — committed registry is in sync with the ledger."
            exit 0
          fi
          BRANCH="registry/auto-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "repomesh-bot"
          git config user.email "repomesh-bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git checkout -b "$BRANCH"
          git commit -m "registry: auto-update derived indexes (trust, verifiers, anchors, badges, snippets)"
          git push origin "$BRANCH"
          PR=$(gh pr create --head "$BRANCH" --base main \
            --title "registry: auto-update derived indexes" \
            --body "Automated registry regeneration after a ledger change — registry-ci cannot push to protected main, so this lands the derived indexes via an auto-merging PR.")
          gh pr merge --auto --merge "$PR" \
            || echo "::warning::Could not enable auto-merge on $PR. Enable once: gh api -X PATCH repos/${{ github.repository }} -f allow_auto_merge=true."
