# Release — publish @mcptoolshop/repomesh to npm via OIDC Trusted Publishing.
#
# Named `release.yml` to match the npm Trusted Publisher binding configured for
# this package (npmjs.com -> @mcptoolshop/repomesh -> Settings -> Trusted
# Publishers -> mcp-tool-shop-org/repomesh, workflow `release.yml`). Auth is
# OIDC — there is intentionally NO NODE_AUTH_TOKEN / NPM_TOKEN.
#
# Publish target is the monorepo package packages/repomesh-cli; the root is a
# private workspace and is never published.
#
# Workflow standards compliance (.claude/rules/workflow-standards.md):
#   PIN_PER_STEP (2)       — actions SHA-pinned; node + npm versions fixed.
#   ANDON_AUTHORITY (2)    — build/test/pack/tag-match gates run BEFORE publish;
#                            any failure halts the job (no continue-on-error).
#   NAMED_COMPENSATORS (3) — see table below; npm publish has a named undo.
#   EXTERNAL_VERIFIER (1)  — n/a to a publish step; CI tests gate in the org CIs.
#
# Compensators (irreversible actions — NO skip allowed):
#   | Action                | Undo                                              | Post-rollback state           | Owner |
#   |-----------------------|---------------------------------------------------|-------------------------------|-------|
#   | npm publish <version> | `npm deprecate @mcptoolshop/repomesh@<v> "broken  | version stays on registry but | Mike  |
#   |                       |  — use <prev>"` (npm forbids unpublish after 72h  | deprecated; consumers pin to  |       |
#   |                       |  / for depended-on pkgs); then publish <v+1>.     | <prev>; ship fixed <v+1>.     |       |
#   | GitHub Release create | `gh release delete <tag> --cleanup-tag`           | release + tag removed         | Mike  |

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish to npm (OIDC trusted publisher)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read       # npm publish only; the GitHub Release is created separately
      id-token: write      # OIDC: npm trusted publishing + Sigstore provenance
    defaults:
      run:
        working-directory: packages/repomesh-cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install npm >= 11.5 in sandbox for OIDC trusted-publishing auth
        working-directory: ${{ github.workspace }}
        run: |
          # Node 22 bundles npm 10.x, which cannot do OIDC trusted publishing,
          # and an in-place `npm i -g npm@latest` races its own arborist rebuild.
          # Install npm@latest into an isolated sandbox and shadow it via PATH.
          SANDBOX="$HOME/.npm-cli-sandbox"
          mkdir -p "$SANDBOX"
          pushd "$SANDBOX" >/dev/null
          echo '{"name":"npm-cli-sandbox","version":"0.0.0","private":true}' > package.json
          npm install --no-save --no-audit --no-fund --silent npm@latest
          popd >/dev/null
          echo "$SANDBOX/node_modules/.bin" >> "$GITHUB_PATH"
          "$SANDBOX/node_modules/.bin/npm" --version

      - name: Install dependencies (workspace root)
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Verify release tag matches package.json version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag: ${GITHUB_REF_NAME} -> ${TAG_VERSION} | Package: ${PKG_VERSION}"
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Release tag ${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Build (src -> dist)
        run: node scripts/build.mjs

      - name: Test
        run: node --test tests/*.test.mjs

      - name: npm pack dry-run (verify tarball shape)
        run: npm pack --dry-run

      - name: Publish to npm with provenance (OIDC trusted publisher)
        # Auth via npm Trusted Publishing (OIDC) — intentionally NO NODE_AUTH_TOKEN.
        run: npm publish --provenance --access public
