name: anchor-xrpl

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  anchor:
    runs-on: ubuntu-latest
    # SB-CI-01 / ANC-B02: hard wall-clock cap. The XRPL post + tx confirmation can stall
    # if testnet is unreachable; without this an `Atomics`-style wait or a hung websocket
    # could keep the job alive until the default 6h GitHub Actions ceiling, burning minutes.
    # 20 minutes is generous for compute-root -> post -> confirm -> rebuild -> PR.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install XRPL dependencies
        run: cd anchor/xrpl && npm ci
      - name: Compute partition root
        run: node anchor/xrpl/scripts/compute-root.mjs --since-last
      - name: Post anchor to XRPL
        env:
          XRPL_SEED: ${{ secrets.XRPL_SEED }}
        run: node anchor/xrpl/scripts/post-anchor.mjs
      - name: Emit anchor event
        env:
          REPOMESH_SIGNING_KEY: ${{ secrets.REPOMESH_SIGNING_KEY }}
          REPOMESH_KEY_ID: ci-repomesh-2026
        run: |
          mkdir -p /tmp/repomesh-ci
          node anchor/xrpl/scripts/emit-anchor-event.mjs --sign --output /tmp/repomesh-ci/anchor.jsonl
      - name: Check for anchor event
        id: check
        run: |
          ANCHOR=$(wc -l < /tmp/repomesh-ci/anchor.jsonl 2>/dev/null || echo 0)
          echo "anchor=$ANCHOR" >> "$GITHUB_OUTPUT"
      - name: Append anchor event to ledger via PR
        if: steps.check.outputs.anchor != '0'
        env:
          GH_TOKEN: ${{ secrets.REPOMESH_LEDGER_TOKEN }}
        run: |
          BRANCH="anchor/$(date -u +%Y%m%d-%H%M%S)"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "repomesh-bot"
          git config user.email "repomesh-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          cat /tmp/repomesh-ci/anchor.jsonl >> ledger/events/events.jsonl
          # LEDGER-A-001: regenerate the whole-ledger all.json manifest so validate-ledger's
          # LOCAL immutability coverage spans the just-appended event. The --since-last partition
          # (computed above) covers the new event ON-CHAIN; all.json keeps the FULL ledger locally
          # tamper-evident. Without this, all.json goes stale every cycle and post-anchor events
          # become unverifiable by `npm run validate:ledger` — the coverage gap the 2026-06-20
          # dogfood swarm closed. (ledger/tests/immutability-coverage.test.mjs is the drift guard.)
          rm -f anchor/xrpl/manifests/all.json
          node anchor/xrpl/scripts/compute-root.mjs --all
          # ANC-B02: rebuild registry/anchors.json from the just-appended anchor event so
          # display surfaces (Pages dashboard, badges, snippets) pick up the new partition's
          # txHash in the SAME commit. Without this, anchors.json lags by a cycle and live
          # partitions render txHash:null ("not yet anchored") even after the on-chain post.
          node registry/scripts/build-anchors.mjs
          git add ledger/events/events.jsonl anchor/xrpl/manifests/*.json registry/anchors.json
          git commit -m "anchor: XRPL partition $(date -u +%Y-%m-%d)"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --head "$BRANCH" \
            --title "anchor: XRPL partition $(date -u +%Y-%m-%d)" \
            --body "$(cat <<'EOF'
          ## RepoMesh XRPL Anchor
          Merkle root of ledger partition anchored to XRPL testnet.
          Ledger CI verifies schema + signatures; this PR auto-merges once validate-ledger is green.
          EOF
          )")
          echo "Opened $PR_URL"
          # STGB-CI-001 (close the loop): enable auto-merge so the anchor lands on main as soon as
          # validate-ledger passes. Without this the daily anchor PRs pile up unmerged, the ledger on
          # main FREEZES, and the LEDGER-A-001 coverage gap re-forms (exactly what happened 2026-06-15..21).
          # Degrades gracefully if the repo hasn't enabled auto-merge yet (one-time operator action).
          gh pr merge --auto --merge "$PR_URL" \
            || echo "::warning::Could not enable auto-merge on $PR_URL. Enable once: gh api -X PATCH repos/${{ github.repository }} -f allow_auto_merge=true (validate-ledger must be a required check)."
          # STGB-CI-001 (staleness andon): if anchor PRs accumulate, the ledger on main is likely
          # frozen — surface it loudly instead of failing silently.
          OPEN_ANCHORS=$(gh pr list --search "anchor: XRPL partition in:title" --state open --json number --jq 'length' 2>/dev/null || echo 0)
          if [ "${OPEN_ANCHORS:-0}" -gt 2 ]; then
            echo "::warning::${OPEN_ANCHORS} anchor PRs are open — the ledger on main may be frozen. Drain oldest-first (gh pr update-branch then merge) and confirm auto-merge is enabled."
          fi
