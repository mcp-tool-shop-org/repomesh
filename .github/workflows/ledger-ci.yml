name: ledger-ci

on:
  pull_request:
    paths:
      - 'ledger/**'
      - 'schemas/**'
      - '.github/workflows/ledger-ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-ledger:
    runs-on: ubuntu-latest
    steps:
      # B-8: Actions pinned to major version tags (v4) — acceptable for this project.
      # Full SHA pinning not required; major tags provide auto-patching with low risk.
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install ledger deps
        working-directory: ledger
        run: npm ci || npm install

      - name: Extract base ledger from main
        run: |
          git show origin/main:ledger/events/events.jsonl > /tmp/base-events.jsonl 2>/dev/null || touch /tmp/base-events.jsonl

      - name: Validate append-only + schema + signature + uniqueness
        working-directory: ledger
        env:
          BASE_LEDGER: /tmp/base-events.jsonl
          HEAD_LEDGER: events/events.jsonl
        run: npm run validate:ledger

      # B-7: Surface actionable error message on failure
      - name: Report failure details
        if: failure()
        run: |
          echo "::error::Ledger validation failed. Check the validator output above for details."
          echo "::error::Common causes: schema violation, invalid signature, duplicate event, or timestamp issue."
          echo "::error::See docs/handbook.md CI Troubleshooting section for resolution steps."
